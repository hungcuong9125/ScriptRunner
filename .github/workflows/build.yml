name: Build macOS App

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Build App
      run: |
        xcodebuild build \
          -project ScriptRunner.xcodeproj \
          -scheme ScriptRunner \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Create .app bundle
      run: |
        mkdir -p build/Release
        cp -R build/Build/Products/Release/ScriptRunner.app build/Release/ScriptRunner.app

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScriptRunner
        path: build/Release/ScriptRunner.app
        retention-days: 30

  release:
    needs: build
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: ScriptRunner
        path: artifact

    - name: Create ZIP
      run: |
        cd artifact
        zip -r ../ScriptRunner.zip ScriptRunner.app

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ScriptRunner.zip
        generate_release_notes: true
