name: Build macOS App

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Build Universal App
      run: |
        xcodebuild build \
          -project ScriptRunner.xcodeproj \
          -scheme ScriptRunner \
          -configuration Release \
          -derivedDataPath build \
          ARCHS="arm64 x86_64" \
          ONLY_ACTIVE_ARCH=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Ad-hoc Code Sign
      run: |
        APP_PATH=$(find build -name "ScriptRunner.app" -type d | head -1)
        echo "Ad-hoc signing: $APP_PATH"
        codesign --force --sign - "$APP_PATH"
        codesign --verify --verbose "$APP_PATH"
        echo "=== Code signature ==="
        codesign -dvv "$APP_PATH" 2>&1 | head -5

    - name: Verify Architecture
      run: |
        APP_PATH=$(find build -name "ScriptRunner.app" -type d | head -1)
        echo "Found app at: $APP_PATH"

        if [ -z "$APP_PATH" ]; then
          echo "Error: ScriptRunner.app not found"
          exit 1
        fi

        # Check architectures
        echo "=== Checking architectures ==="
        lipo -info "$APP_PATH/Contents/MacOS/ScriptRunner"

    - name: Create DMG
      run: |
        APP_PATH=$(find build -name "ScriptRunner.app" -type d | head -1)
        VERSION=$(grep -A1 "MARKETING_VERSION" ScriptRunner.xcodeproj/project.pbxproj | grep -o '[0-9]\.[0-9]\.[0-9]' | head -1)
        DMG_NAME="ScriptRunner_${VERSION}_universal.dmg"

        echo "Creating DMG: $DMG_NAME"

        # Create temporary directory for DMG contents
        mkdir -p dmg_staging
        cp -R "$APP_PATH" dmg_staging/

        # Create symlink to Applications
        ln -s /Applications dmg_staging/Applications

        # Create DMG
        hdiutil create \
          -volname "ScriptRunner" \
          -srcfolder dmg_staging \
          -ov \
          -format UDZO \
          "$DMG_NAME"

        # Verify DMG
        echo "=== DMG created ==="
        ls -lh "$DMG_NAME"

        # Also create ZIP for compatibility
        cd "$(dirname "$APP_PATH")"
        zip -r "$GITHUB_WORKSPACE/ScriptRunner_${VERSION}_universal.zip" ScriptRunner.app

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ScriptRunner
        path: |
          ScriptRunner_*.dmg
          ScriptRunner_*.zip
        retention-days: 30

  release:
    needs: build
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: ScriptRunner
        path: .

    - name: List Files
      run: |
        echo "=== Files to release ==="
        ls -lh

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: ScriptRunner ${{ github.ref_name }}
        files: |
          ScriptRunner_*.dmg
          ScriptRunner_*.zip
        generate_release_notes: true
